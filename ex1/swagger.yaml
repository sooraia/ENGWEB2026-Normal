openapi: 3.0.0
info:
  title: API de Jogos de Tabuleiro
  description: API para consultar e gerir jogos de tabuleiro, autores e categorias.
  version: 1.0.0
servers:
  - url: http://localhost:17000
    description: Servidor da API

tags:
  - name: Jogos
    description: Operações sobre jogos
  - name: Autores
    description: Operações sobre autores
  - name: Categorias
    description: Operações sobre categorias

paths:
  /autores:
    get:
      tags:
        - Autores
      summary: Lista todos os autores
      responses:
        '200':
          description: Lista de autores.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Autor'
        '500':
          description: Erro interno do servidor.

  /categorias:
    get:
      tags:
        - Categorias
      summary: Lista todas as categorias
      responses:
        '200':
          description: Lista de categorias.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
        '500':
          description: Erro interno do servidor.

  /jogos:
    get:
      tags:
        - Jogos
      summary: Lista jogos
      parameters:
        - in: query
          name: editora
          schema:
            type: string
          description: Nome da editora a filtrar.
      responses:
        '200':
          description: Lista de jogos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JogoResumo'
        '500':
          description: Erro interno do servidor.

    post:
      tags:
        - Jogos
      summary: Cria um novo jogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Jogo criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Jogo'
        '400':
          description: Pedido inválido.

  /jogos/{id}:
    get:
      tags:
        - Jogos
      summary: Obtém um jogo por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador do jogo.
      responses:
        '200':
          description: Jogo encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Jogo'
        '404':
          description: Jogo não encontrado.
        '500':
          description: Erro interno do servidor.

    put:
      tags:
        - Jogos
      summary: Atualiza um jogo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador do jogo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Jogo atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Jogo'
        '404':
          description: Jogo não encontrado.
        '500':
          description: Erro interno do servidor.

    delete:
      tags:
        - Jogos
      summary: Remove um jogo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador do jogo.
      responses:
        '200':
          description: Jogo eliminado com sucesso.
        '404':
          description: Jogo não encontrado.
        '500':
          description: Erro interno do servidor.

components:
  schemas:
    JogoResumo:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        year:
          type: integer
        category:
          type: string
        minPlayers:
          type: integer
      required:
        - _id
        - name

    Jogo:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        year:
          type: integer
        category:
          type: string
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        playingTimeMinutes:
          type: integer
        descriptionEN:
          type: string
        autores:
          type: array
          items:
            $ref: '#/components/schemas/AutorRef'
        editoras:
          type: array
          items:
            $ref: '#/components/schemas/EditoraRef'
        mecanicas:
          type: array
          items:
            $ref: '#/components/schemas/MecanicaRef'
        premios:
          type: array
          items:
            $ref: '#/components/schemas/PremioRef'

    Autor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jogos:
          type: array
          items:
            $ref: '#/components/schemas/JogoSimplificado'
      required:
        - id
        - name
        - jogos

    Categoria:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jogos:
          type: array
          items:
            $ref: '#/components/schemas/JogoSimplificado'
      required:
        - id
        - name
        - jogos

    JogoSimplificado:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    AutorRef:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string

    EditoraRef:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        country:
          type: string

    MecanicaRef:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string

    PremioRef:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        year:
          type: integer
